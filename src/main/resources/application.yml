server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: fwms
  datasource:
    url: jdbc:mysql://localhost:3306/fwms?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  thymeleaf:
    cache: false
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.fwms.entity
  configuration:
    map-underscore-to-camel-case: true
    # 开发环境可开启 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.fwms: debug
