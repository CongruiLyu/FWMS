<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/base :: base('__${title}__', ~{::section}, ~{::script})}">
<section>
    <div class="card">
        <div style="margin-bottom:16px;">
            <button class="btn btn-primary" onclick="showModal('shipModal')">发货出库</button>
        </div>
        <table>
            <thead><tr><th>出库单号</th><th>订单号</th><th>客户</th><th>产品</th><th>数量</th><th>库位</th><th>操作员</th><th>发货时间</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="modal-overlay" id="shipModal">
        <div class="modal">
            <h3>发货出库（拣货→出库→库存减少）</h3>
            <div class="form-group"><label>待发货订单</label><select id="salesOrderId" class="form-control"></select></div>
            <div class="form-group"><label>出库库位</label><select id="locationId" class="form-control"></select></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideModal('shipModal')">取消</button>
                <button class="btn btn-primary" onclick="ship()">确认发货</button>
            </div>
        </div>
    </div>
</section>
<script th:fragment="script">
async function loadOptions() {
    const [orders, locations] = await Promise.all([apiGet('/api/sales-orders?status=PENDING'), apiGet('/api/locations?zone=C')]);
    salesOrderId.innerHTML = (orders.data||[]).map(o => `<option value="${o.id}">${o.orderNo} - ${o.customerName} - ${o.productName} x${o.quantity}</option>`).join('') || '<option value="">暂无待发货订单</option>';
    locationId.innerHTML = (locations.data||[]).map(l => `<option value="${l.id}">${l.code} ${l.name}</option>`).join('');
}
async function load() {
    const res = await apiGet('/api/shipments');
    document.getElementById('tableBody').innerHTML = (res.data||[]).map(s =>
        `<tr><td>${s.shipmentNo}</td><td>${s.orderNo||'-'}</td><td>${s.customerName||'-'}</td><td>${s.productName}</td>
        <td>${s.quantity}</td><td>${s.locationCode||'-'}</td><td>${s.operatorName||'-'}</td><td>${formatDateTime(s.shipmentTime)}</td></tr>`).join('');
}
async function ship() {
    if (!salesOrderId.value) { toast('暂无待发货订单', true); return; }
    const res = await apiPost('/api/shipments', { salesOrderId: salesOrderId.value, locationId: locationId.value });
    if (res.code === 200) { hideModal('shipModal'); load(); loadOptions(); toast('发货成功'); } else toast(res.message, true);
}
loadOptions(); load();
</script>
</html>
