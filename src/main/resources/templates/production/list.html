<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/base :: base('__${title}__', ~{::section}, ~{::script})}">
<section>
    <div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:16px;">
            <select id="statusFilter" class="form-control" style="width:150px;">
                <option value="">全部</option><option value="PRODUCING">生产中</option><option value="QC_PENDING">待质检</option>
                <option value="QC_PASS">质检通过</option><option value="STORED">已入库</option>
            </select>
            <button class="btn btn-primary" onclick="showModal('prodModal')">新建生产批次</button>
        </div>
        <table>
            <thead><tr><th>批次号</th><th>产品</th><th>数量</th><th>生产日期</th><th>负责人</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="modal-overlay" id="prodModal">
        <div class="modal">
            <h3>新建生产批次</h3>
            <div class="form-group"><label>产品</label><select id="productId" class="form-control"></select></div>
            <div class="form-group"><label>生产数量</label><input id="quantity" type="number" class="form-control"></div>
            <div class="form-group"><label>生产日期</label><input id="productionDate" type="date" class="form-control"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideModal('prodModal')">取消</button>
                <button class="btn btn-primary" onclick="create()">创建</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="storeModal">
        <div class="modal">
            <h3>成品入库</h3>
            <input type="hidden" id="storeProdId">
            <div class="form-group"><label>库位(C区-按交期排序)</label><select id="storeLocationId" class="form-control"></select></div>
            <div class="form-group"><label>交货日期</label><input id="deliveryDate" type="date" class="form-control"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideModal('storeModal')">取消</button>
                <button class="btn btn-primary" onclick="doStore()">确认入库</button>
            </div>
        </div>
    </div>
</section>
<script th:fragment="script">
async function loadOptions() {
    const [products, locations] = await Promise.all([apiGet('/api/products'), apiGet('/api/locations?zone=C')]);
    productId.innerHTML = (products.data||[]).map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    storeLocationId.innerHTML = (locations.data||[]).map(l => `<option value="${l.id}">${l.code} ${l.name}</option>`).join('');
    productionDate.value = new Date().toISOString().substring(0,10);
    deliveryDate.value = new Date().toISOString().substring(0,10);
}
async function load() {
    const res = await apiGet('/api/productions?status=' + statusFilter.value);
    document.getElementById('tableBody').innerHTML = (res.data||[]).map(p => {
        let actions = '';
        if (p.status === 'PRODUCING') actions = `<button class="btn btn-sm btn-info" onclick="submitQc(${p.id})">提交质检</button>`;
        if (p.status === 'QC_PASS') actions = `<button class="btn btn-sm btn-primary" onclick="openStore(${p.id})">成品入库</button>`;
        return `<tr><td>${p.batchNo}</td><td>${p.productName}</td><td>${p.quantity} ${p.unit||''}</td>
        <td>${formatDate(p.productionDate)}</td><td>${p.leaderName||'-'}</td><td>${statusBadge(p.status)}</td><td>${actions}</td></tr>`;
    }).join('');
}
async function create() {
    const res = await apiPost('/api/productions', { productId: productId.value, quantity: quantity.value, productionDate: productionDate.value });
    if (res.code === 200) { hideModal('prodModal'); load(); toast('生产批次已创建'); }
}
async function submitQc(id) { await apiPut('/api/productions/'+id+'/submit-qc'); load(); toast('已提交质检'); }
function openStore(id) { storeProdId.value = id; showModal('storeModal'); }
async function doStore() {
    const res = await apiPost('/api/productions/'+storeProdId.value+'/store', { locationId: storeLocationId.value, deliveryDate: deliveryDate.value });
    if (res.code === 200) { hideModal('storeModal'); load(); toast('成品入库成功'); } else toast(res.message, true);
}
statusFilter.addEventListener('change', load);
loadOptions(); load();
</script>
</html>
