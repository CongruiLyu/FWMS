<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FWMS食品仓库管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-page">
    <div class="login-box">
        <h1>FWMS</h1>
        <div class="subtitle">食品加工企业智能仓库管理系统</div>
        <div th:if="${param.error}" class="alert-error">用户名或密码错误，请重试</div>
        <form method="post" action="/login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">登 录</button>
        </form>
        <p class="login-footer">© 2026 FWMS 食品仓库管理系统</p>
        <div class="demo-accounts">
            <p><strong>演示账号（密码均为 123456）：</strong></p>
            <table>
                <tr><td>admin</td><td>管理员</td></tr>
                <tr><td>warehouse</td><td>仓库管理员</td></tr>
                <tr><td>purchaser</td><td>采购员</td></tr>
                <tr><td>qc</td><td>质检员</td></tr>
                <tr><td>production</td><td>生产人员</td></tr>
                <tr><td>sales</td><td>销售员</td></tr>
            </table>
        </div>
    </div>
</div>
</body>
</html>
