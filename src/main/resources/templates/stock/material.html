<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/base :: base('__${title}__', ~{::section}, ~{::script})}">
<section>
    <div class="card">
        <table>
            <thead><tr><th>原料名称</th><th>编号</th><th>库存数量</th><th>库位</th><th>预警阈值</th><th>最近入库</th><th>状态</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</section>
<script th:fragment="script">
async function load() {
    const res = await apiGet('/api/material-stocks');
    document.getElementById('tableBody').innerHTML = (res.data||[]).map(s =>
        `<tr${s.alert ? ' style="background:#fdecea;"' : ''}><td>${s.materialName}</td><td>${s.materialCode}</td>
        <td class="${s.alert?'text-danger':''}">${s.quantity} ${s.unit}</td><td>${s.locationCode||'-'}</td>
        <td>${s.alertThreshold}</td><td>${formatDateTime(s.lastInboundTime)}</td>
        <td>${s.alert ? '<span class="badge badge-danger">库存不足</span>' : '<span class="badge badge-success">正常</span>'}</td></tr>`).join('');
}
load();
</script>
</html>
