<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/base :: base('__${title}__', ~{::section}, ~{::script})}">
<section>
    <div class="card">
        <table>
            <thead><tr><th>产品</th><th>编号</th><th>库存</th><th>库位</th><th>生产日期</th><th>保质期至</th><th>交货日期</th><th>状态</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</section>
<script th:fragment="script">
async function load() {
    const res = await apiGet('/api/product-stocks');
    document.getElementById('tableBody').innerHTML = (res.data||[]).map(s =>
        `<tr${s.alert ? ' style="background:#fdecea;"' : ''}><td>${s.productName}</td><td>${s.productCode}</td>
        <td class="${s.alert?'text-danger':''}">${s.quantity} ${s.unit}</td><td>${s.locationCode||'-'}</td>
        <td>${formatDate(s.productionDate)}</td><td>${formatDate(s.expiryDate)}</td><td>${formatDate(s.deliveryDate)}</td>
        <td>${s.alert ? '<span class="badge badge-danger">库存不足</span>' : '<span class="badge badge-success">正常</span>'}</td></tr>`).join('');
}
load();
</script>
</html>
