<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/base :: base('__${title}__', ~{::section}, ~{::script})}">
<section>
    <div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:16px;">
            <select id="statusFilter" class="form-control" style="width:150px;">
                <option value="">全部</option><option value="PENDING">待发货</option><option value="SHIPPED">已发货</option>
            </select>
            <button class="btn btn-primary" onclick="showModal('orderModal')">新建订单</button>
        </div>
        <table>
            <thead><tr><th>订单编号</th><th>客户</th><th>产品</th><th>数量</th><th>交货日期</th><th>状态</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <h3>新建客户订单</h3>
            <div class="form-group"><label>客户</label><select id="customerId" class="form-control"></select></div>
            <div class="form-group"><label>产品</label><select id="productId" class="form-control"></select></div>
            <div class="form-group"><label>数量</label><input id="quantity" type="number" class="form-control"></div>
            <div class="form-group"><label>交货日期</label><input id="deliveryDate" type="date" class="form-control"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideModal('orderModal')">取消</button>
                <button class="btn btn-primary" onclick="save()">保存</button>
            </div>
        </div>
    </div>
</section>
<script th:fragment="script">
async function loadOptions() {
    const [customers, products] = await Promise.all([apiGet('/api/customers'), apiGet('/api/products')]);
    customerId.innerHTML = (customers.data||[]).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    productId.innerHTML = (products.data||[]).map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    deliveryDate.value = new Date().toISOString().substring(0,10);
}
async function load() {
    const res = await apiGet('/api/sales-orders?status=' + statusFilter.value);
    document.getElementById('tableBody').innerHTML = (res.data||[]).map(o =>
        `<tr><td>${o.orderNo}</td><td>${o.customerName}</td><td>${o.productName}</td><td>${o.quantity} ${o.unit||''}</td>
        <td>${formatDate(o.deliveryDate)}</td><td>${statusBadge(o.status)}</td></tr>`).join('');
}
async function save() {
    const res = await apiPost('/api/sales-orders', { customerId: customerId.value, productId: productId.value, quantity: quantity.value, deliveryDate: deliveryDate.value });
    if (res.code === 200) { hideModal('orderModal'); load(); toast('订单已创建'); } else toast(res.message, true);
}
statusFilter.addEventListener('change', load);
loadOptions(); load();
</script>
</html>
